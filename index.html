<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0C0A09" />
<meta name="description" content="Жарава — личен 180-дневен планер: хранене, тренировки, навици, контент и прогрес." />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Жарава · Live Planner</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />

<!-- Критичният CSS е локален и малък — зарежда мигновено -->
<link rel="stylesheet" href="css/style.css" />

<!-- Шрифтовете се зареждат БЕЗ да блокират рендера; при липса на мрежа
     се ползва системният шрифт (font stack в style.css) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700;800&display=swap"
      media="print" onload="this.media='all'" />
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700;800&display=swap" />
</noscript>
</head>
<body>
<div id="root" class="app"></div>

<!-- defer = не блокират парсването на страницата -->
<script src="js/data.js" defer></script>
<script src="js/app.js" defer></script>

<script>
// Офлайн режим (PWA): регистрира service worker, ако браузърът поддържа
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
